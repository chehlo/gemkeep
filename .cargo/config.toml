# System library paths for native dependencies (gexiv2, etc.).
# macOS: Homebrew installs to /opt/homebrew; pkg-config finds them there.
# Linux: override with PKG_CONFIG_PATH env var or install system packages.
[env]
PKG_CONFIG_PATH = { value = "/opt/homebrew/lib/pkgconfig", force = false }
# Limit parallel test threads to prevent system unresponsiveness.
# Without this, cargo test spawns many threads per core, and tests that
# create rayon pools multiply that further, causing thread explosion.
RUST_TEST_THREADS = { value = "2", force = true }
